name: Catalog Service CI/CD Pipeline

# Trigger only when catalog-service source files change — avoids unnecessary runs
on:
  push:
    branches: [main]
    paths: [backend/catalog-service/**]
  pull_request:
    branches: [main]
    paths: [backend/catalog-service/**]

env:
  DOCKER_IMAGE: karthi6559/csc8113bookstore-catalog-service

jobs:
  # ─── Stage 1: Build & Test ────────────────────────────────────────────────
  # Compiles the Spring Boot app, runs unit + integration tests via Maven verify
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/catalog-service
    steps:
      - uses: actions/checkout@v4           # Fixed: actions/checkout@v5 does not exist
      - name: Setup Java 21
        uses: actions/setup-java@v4         # Fixed: actions/setup-java@v5 does not exist
        with:
          java-version: '21'
          distribution: temurin
          cache: maven                      # Cache ~/.m2 to avoid re-downloading dependencies
      - name: Build and test
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp verify               # verify runs: compile → test → integration-test
      - name: Upload JAR artifact
        # Upload the compiled JAR so the docker job can use it without rebuilding
        uses: actions/upload-artifact@v4
        with:
          name: catalog-service-jar
          path: backend/catalog-service/target/*.jar
          retention-days: 1                 # Short TTL — only needed for this pipeline run

  # ─── Stage 2: Security Scan ───────────────────────────────────────────────
  # Scans source + dependencies for known CVEs — pipeline FAILS if HIGH or
  # CRITICAL issues are found, blocking docker build and deploy.
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write               # Required to push SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan (console output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend/catalog-service  # Scans pom.xml for dependency CVEs
          format: table               # human-readable table in the logs
          severity: CRITICAL,HIGH
          exit-code: '1'             # still blocks the pipeline

      - name: Trivy scan (SARIF for GitHub Security tab)
        if: always()                  # run even if previous step failed
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend/catalog-service
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'             # don't double-fail here, first step handles it

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()                       # Upload even if Trivy exited with code 1
        with:
          sarif_file: trivy-results.sarif

  # ─── Stage 3: Docker Build & Push ─────────────────────────────────────────
  # Only runs on push to main — PRs don't publish images
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        # Reuse the JAR built in the ci job — avoids a second Maven compile
        uses: actions/download-artifact@v4
        with:
          name: catalog-service-jar
          path: backend/catalog-service/target/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/catalog-service  # Uses backend/catalog-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}  # SHA tag ties image to exact commit
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        # Scan the pushed image for OS-level CVEs (libc, Alpine packages, etc.)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image-results.sarif') != ''  # skip if Docker login failed
        with:
          sarif_file: trivy-image-results.sarif

  # ─── Stage 4: Deploy to LocalStack EKS ────────────────────────────────────
  # Uses a blue deployment (catalog-service-blue) — green is kept for manual
  # traffic switch as part of the blue-green zero-downtime deployment strategy
  deploy-localstack:
    name: Deploy to LocalStack EKS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start LocalStack
        uses: localstack/setup-localstack@v0.2.3
        with:
          image-tag: latest
          install-awslocal: 'true'
        env:
          LOCALSTACK_API_KEY: ${{ secrets.LOCALSTACK_API_KEY }}  # Requires LocalStack Pro for EKS
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
      - name: Create EKS cluster
        # || true prevents failure if the cluster already exists from a previous run
        run: |
          awslocal eks create-cluster \
            --name bookstore \
            --kubernetes-version "1.29" \
            --role-arn arn:aws:iam::000000000000:role/eks-role \
            --resources-vpc-config subnetIds=subnet-12345,securityGroupIds=sg-12345 \
            --region us-east-1 || true
      - name: Configure kubectl
        run: awslocal eks update-kubeconfig --name bookstore --region us-east-1
      - name: Deploy catalog-service (blue)
        run: |
          kubectl apply -f deployment/k8s/catalog-service-blue.yml
          # Override image to the exact SHA built in this run
          kubectl set image deployment/catalog-service-blue \
            catalog-service=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/catalog-service-blue --timeout=180s
