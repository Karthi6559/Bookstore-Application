name: Cart Service CI/CD Pipeline

on:
  push:
    branches: [main]
    paths: [backend/cart-service/**]
  pull_request:
    branches: [main]
    paths: [backend/cart-service/**]

env:
  DOCKER_IMAGE: karthi6559/csc8113bookstore-cart-service

jobs:
  # ─── Stage 1: Build & Test ────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/cart-service
    steps:
      - uses: actions/checkout@v4           # Fixed: v5 does not exist
      - name: Setup Java 21
        uses: actions/setup-java@v4         # Fixed: v5 does not exist
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Build and test
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp verify
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cart-service-jar
          path: backend/cart-service/target/*.jar
          retention-days: 1

  # ─── Stage 2: Security Scan ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan (console output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend/cart-service
          format: table               # human-readable table in the logs
          severity: CRITICAL,HIGH
          exit-code: '1'             # still blocks the pipeline

      - name: Trivy scan (SARIF for GitHub Security tab)
        if: always()                  # run even if previous step failed
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend/cart-service
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'             # don't double-fail here, first step handles it

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─── Stage 3: Docker Build & Push ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: cart-service-jar
          path: backend/cart-service/target/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cart-service
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

  # ─── Stage 4: Deploy to LocalStack EKS ────────────────────────────────────
  deploy-localstack:
    name: Deploy to LocalStack EKS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start LocalStack
        uses: localstack/setup-localstack@v0.2.3
        with:
          image-tag: latest
          install-awslocal: 'true'
        env:
          LOCALSTACK_API_KEY: ${{ secrets.LOCALSTACK_API_KEY }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Create EKS cluster
        run: |
          awslocal eks create-cluster \
            --name bookstore \
            --kubernetes-version "1.29" \
            --role-arn arn:aws:iam::000000000000:role/eks-role \
            --resources-vpc-config subnetIds=subnet-12345,securityGroupIds=sg-12345 \
            --region us-east-1 || true
      - name: Configure kubectl
        run: awslocal eks update-kubeconfig --name bookstore --region us-east-1
      - name: Deploy cart-service
        run: |
          kubectl apply -f deployment/k8s/cart-service.yml
          kubectl set image deployment/cart-service \
            cart-service=${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/cart-service --timeout=180s
