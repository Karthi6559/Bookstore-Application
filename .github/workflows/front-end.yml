name: Frontend CI/CD Pipeline

# Trigger on push to main OR any PR targeting main, but only when front-end files change
on:
  push:
    branches: [main]
    paths: [front-end/**]
  pull_request:
    branches: [main]
    paths: [front-end/**]

jobs:
  # ─── Stage 1: Build & Test ────────────────────────────────────────────────
  # Compiles the React app with Vite to catch build errors early
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front-end
    steps:
      - uses: actions/checkout@v4          # v5 does not exist; v4 is the latest stable
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm                        # Cache node_modules across runs to speed up CI
          cache-dependency-path: front-end/package-lock.json
      - name: Install dependencies
        run: npm ci                         # Strict install — fails if lock file is out of sync
      - name: Build
        run: npm run build                  # Vite production build — exits non-zero on any error

  # ─── Stage 2: Security Scan ───────────────────────────────────────────────
  # Runs on every push AND every PR — pipeline FAILS if HIGH or CRITICAL issues
  # are found. Docker build and deploy are blocked until the scan is clean.
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci                               # Only scan if the build succeeded
    permissions:
      security-events: write               # Required to upload SARIF to GitHub Security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - name: Install dependencies
        working-directory: ./front-end
        run: npm ci
      - name: npm audit
        working-directory: ./front-end
        # Fails the job immediately if any HIGH or CRITICAL advisory is found
        run: npm audit --audit-level=high
      - name: Trivy scan (console output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./front-end             # Scan source files and package-lock.json
          format: table               # human-readable table in the logs
          severity: CRITICAL,HIGH
          exit-code: '1'             # still blocks the pipeline

      - name: Trivy scan (SARIF for GitHub Security tab)
        if: always()                  # run even if previous step failed
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./front-end
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'             # don't double-fail here, first step handles it

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()                        # Upload even if Trivy found issues (exit code 1)
        with:
          sarif_file: trivy-results.sarif

  # ─── Stage 3: Docker Build & Push ─────────────────────────────────────────
  # Only runs on push to main (not PRs) — we don't publish unmerged images
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3  # Enables multi-platform builds and GHA cache
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # Set in repo → Settings → Secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}     # Docker Hub access token (not password)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./front-end              # Uses front-end/Dockerfile (multi-stage Node→Nginx)
          push: true
          tags: |
            karthi6559/csc8113bookstore-frontend:latest
            karthi6559/csc8113bookstore-frontend:${{ github.sha }}  # SHA tag for traceability
          cache-from: type=gha             # Reuse cached Docker layers from previous runs
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        # Scan the pushed image for OS-level CVEs that filesystem scan can't catch
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: karthi6559/csc8113bookstore-frontend:${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

  # ─── Stage 4: Deploy to LocalStack EKS ────────────────────────────────────
  # LocalStack emulates AWS locally/in CI so we can test EKS deployments
  # without a real AWS account. Requires LocalStack Pro for EKS support
  # (set LOCALSTACK_API_KEY secret in GitHub repo settings).
  deploy-localstack:
    name: Deploy to LocalStack EKS
    runs-on: ubuntu-latest
    needs: docker                          # Only deploy after the image is successfully pushed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start LocalStack
        uses: localstack/setup-localstack@v0.2.3
        with:
          image-tag: latest
          install-awslocal: 'true'         # Installs the awslocal CLI wrapper
        env:
          LOCALSTACK_API_KEY: ${{ secrets.LOCALSTACK_API_KEY }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Create EKS cluster
        # || true prevents failure if the cluster already exists from a previous run
        run: |
          awslocal eks create-cluster \
            --name bookstore \
            --kubernetes-version "1.29" \
            --role-arn arn:aws:iam::000000000000:role/eks-role \
            --resources-vpc-config subnetIds=subnet-12345,securityGroupIds=sg-12345 \
            --region us-east-1 || true
      - name: Configure kubectl
        # Writes ~/.kube/config so kubectl commands target the LocalStack EKS cluster
        run: awslocal eks update-kubeconfig --name bookstore --region us-east-1
      - name: Deploy frontend
        run: |
          kubectl apply -f deployment/k8s/frontend.yml
          # Override the image tag to the exact SHA built in this run
          kubectl set image deployment/frontend \
            frontend=karthi6559/csc8113bookstore-frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend --timeout=120s
